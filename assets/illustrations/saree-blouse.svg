<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Saree and blouse">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b35c00"/>
      <stop offset="1" stop-color="#9b2424"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#016b6f"/>
      <stop offset="1" stop-color="#014e52"/>
    </linearGradient>
    <pattern id="border" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#c89000"/>
      <circle cx="7" cy="7" r="3" fill="#9b2424"/>
    </pattern>
  </defs>

  <rect width="480" height="320" fill="#fff9f3"/>

  <!-- Saree drape (body + pleats + pallu) -->
  <g transform="translate(60,40)">
    <!-- body -->
    <path d="M20 30 C 0 110, 10 220, 60 250 L150 250 C150 160,140 80,120 30 Z" fill="url(#sg)"/>
    <!-- pleats -->
    <g stroke="#fff9f3" stroke-width="2" opacity="0.5">
      <path d="M55 250 C45 170,55 90,70 40" fill="none"/>
      <path d="M75 250 C70 170,78 90,88 40" fill="none"/>
      <path d="M95 250 C95 170,100 90,105 40" fill="none"/>
    </g>
    <!-- border -->
    <path d="M20 30 C 0 110, 10 220, 60 250" fill="none" stroke="url(#border)" stroke-width="10"/>
    <!-- pallu draped over -->
    <path d="M120 30 C200 10, 230 60, 200 130 C180 100,150 70,120 60 Z" fill="url(#sg)" opacity="0.92"/>
    <path d="M120 30 C200 10, 230 60, 200 130" fill="none" stroke="url(#border)" stroke-width="9"/>
    <!-- pallu motifs -->
    <g fill="#fbe9c8">
      <circle cx="160" cy="55" r="5"/><circle cx="185" cy="70" r="5"/><circle cx="150" cy="85" r="4"/>
    </g>
  </g>

  <!-- Blouse (front bodice with darts, sleeve, neckline) -->
  <g transform="translate(300,70)">
    <!-- bodice -->
    <path d="M30 30 L110 30 L120 55 L118 150 L22 150 L20 55 Z" fill="url(#bg)"/>
    <!-- neckline -->
    <path d="M52 30 C60 60,80 60,88 30" fill="#fff9f3"/>
    <!-- princess/dart seams -->
    <g stroke="#fff9f3" stroke-width="1.6" opacity="0.7" fill="none">
      <path d="M50 60 C46 100,50 130,48 150"/>
      <path d="M90 60 C94 100,90 130,92 150"/>
    </g>
    <!-- left sleeve -->
    <path d="M30 30 L4 48 L14 78 L30 60 Z" fill="url(#bg)"/>
    <!-- right sleeve -->
    <path d="M110 30 L136 48 L126 78 L110 60 Z" fill="url(#bg)"/>
    <!-- hem trim -->
    <rect x="20" y="146" width="98" height="6" fill="#c89000"/>
    <!-- apex points -->
    <circle cx="56" cy="78" r="2.4" fill="#fbe9c8"/>
    <circle cx="84" cy="78" r="2.4" fill="#fbe9c8"/>
  </g>

  <!-- labels -->
  <g font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#7a5c3a">
    <text x="120" y="305" text-anchor="middle">साड़ी · Saree</text>
    <text x="360" y="305" text-anchor="middle">ब्लाउज़ · Blouse</text>
  </g>
</svg>
