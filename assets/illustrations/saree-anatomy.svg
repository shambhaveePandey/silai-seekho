<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" role="img" aria-label="साड़ी के भाग — Parts of a Saree">
  <style>
    .lbl{font:700 11px 'Noto Sans Devanagari','Work Sans',sans-serif;fill:#2a1a0a}
    .lbl-en{font:500 9px 'Work Sans',sans-serif;fill:#7a5c3a}
    .lbl-sm{font:600 9px 'Work Sans',sans-serif;fill:#7a5c3a}
    .arr{stroke:#b35c00;stroke-width:1.5;fill:none;marker-end:url(#ah)}
    @keyframes shimmer{0%,100%{opacity:.7}50%{opacity:1}}
    .pallu-motif{animation:shimmer 2.5s ease-in-out infinite}
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#b35c00" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d5b0"/>
      <stop offset="1" stop-color="#d4c090"/>
    </linearGradient>
    <linearGradient id="palluGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b35c00"/>
      <stop offset="1" stop-color="#9b2424"/>
    </linearGradient>
    <linearGradient id="tickGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#016b6f"/>
      <stop offset="1" stop-color="#014e52"/>
    </linearGradient>
    <pattern id="bodyPatt" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="url(#bodyGrad)"/>
      <line x1="0" y1="9" x2="18" y2="9" stroke="#c4a882" stroke-width="0.5"/>
      <line x1="9" y1="0" x2="9" y2="18" stroke="#c4a882" stroke-width="0.5"/>
    </pattern>
    <pattern id="borderPatt" width="16" height="12" patternUnits="userSpaceOnUse">
      <rect width="16" height="12" fill="#c89000"/>
      <circle cx="8" cy="6" r="2.5" fill="#9b2424"/>
      <rect x="0" y="0" width="4" height="12" fill="#b35c00" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="560" height="260" fill="#fff9f3"/>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-family="'Noto Sans Devanagari','Work Sans'" font-size="13" font-weight="700" fill="#2a1a0a">साड़ी की बनावट</text>
  <text x="280" y="36" text-anchor="middle" font-family="'Work Sans'" font-size="10" fill="#7a5c3a">Anatomy of a Saree · 6 Yards / 5.5 Metres</text>

  <!-- MAIN SAREE BODY -->
  <!-- Tuck End (left ~80px) -->
  <rect x="30" y="55" width="80" height="100" fill="url(#tickGrad)" rx="3"/>
  <text x="70" y="100" text-anchor="middle" class="lbl" fill="white">टक एंड</text>
  <text x="70" y="114" text-anchor="middle" class="lbl-en" fill="rgba(255,255,255,0.85)">Tuck End</text>
  <text x="70" y="126" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="rgba(255,255,255,0.7)">~0.5 गज़</text>

  <!-- Body section (middle ~260px) -->
  <rect x="110" y="55" width="260" height="100" fill="url(#bodyPatt)" rx="0"/>
  <!-- Border strips top and bottom -->
  <rect x="110" y="55" width="260" height="12" fill="url(#borderPatt)" rx="0"/>
  <rect x="110" y="143" width="260" height="12" fill="url(#borderPatt)" rx="0"/>
  <text x="240" y="102" text-anchor="middle" class="lbl">बॉडी (मुख्य भाग)</text>
  <text x="240" y="116" text-anchor="middle" class="lbl-en">Body (Main Section)</text>
  <text x="240" y="128" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="#7a5c3a">~4 गज़ · wraps around the petticoat</text>

  <!-- Pallu (right ~110px) -->
  <rect x="370" y="55" width="140" height="100" fill="url(#palluGrad)" rx="3"/>
  <!-- Pallu border -->
  <rect x="370" y="55" width="140" height="12" fill="#c89000" opacity="0.8"/>
  <rect x="370" y="143" width="140" height="12" fill="#c89000" opacity="0.8"/>
  <!-- Pallu motifs -->
  <g class="pallu-motif">
    <circle cx="405" cy="98" r="5" fill="#fbe9c8" opacity="0.8"/>
    <circle cx="435" cy="85" r="4" fill="#fbe9c8" opacity="0.7"/>
    <circle cx="460" cy="105" r="5" fill="#fbe9c8" opacity="0.8"/>
    <circle cx="490" cy="88" r="4" fill="#fbe9c8" opacity="0.7"/>
    <path d="M398,108 Q410,95 422,108" fill="none" stroke="#fbe9c8" stroke-width="1.5" opacity="0.6"/>
    <path d="M448,90 Q460,78 472,90" fill="none" stroke="#fbe9c8" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="440" y="100" text-anchor="middle" class="lbl" fill="white">पल्लू</text>
  <text x="440" y="114" text-anchor="middle" class="lbl-en" fill="rgba(255,255,255,0.85)">Pallu</text>
  <text x="440" y="126" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="rgba(255,255,255,0.7)">~1.25 गज़ · over shoulder</text>

  <!-- Border labels (top) -->
  <line x1="110" y1="48" x2="370" y2="48" stroke="#c89000" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="46" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="#c89000">बॉर्डर / Border (ऊपर)</text>

  <!-- Border label (bottom) -->
  <line x1="110" y1="162" x2="370" y2="162" stroke="#c89000" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="175" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="#c89000">बॉर्डर / Border (नीचे)</text>

  <!-- Length arrow -->
  <line x1="30" y1="170" x2="510" y2="170" stroke="#b35c00" stroke-width="1.5" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <text x="270" y="185" text-anchor="middle" class="lbl">6 गज़ = 5.5 मीटर = 216 इंच</text>

  <!-- Width arrow -->
  <line x1="15" y1="55" x2="15" y2="155" stroke="#016b6f" stroke-width="1.5" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <text x="14" y="112" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="#016b6f" transform="rotate(-90 14 112)">45–48" चौड़ाई</text>

  <!-- Draping note -->
  <rect x="30" y="200" width="500" height="48" rx="8" fill="#016b6f" opacity="0.08" stroke="#016b6f" stroke-width="1" opacity="0.3"/>
  <text x="280" y="218" text-anchor="middle" font-family="'Noto Sans Devanagari'" font-size="10" fill="#014e52">पहनने का क्रम: पेटीकोट → टक एंड अंदर → बॉडी को लपेटें → पल्लू कंधे पर</text>
  <text x="280" y="234" text-anchor="middle" font-family="'Work Sans'" font-size="9" fill="#016b6f">Draping order: petticoat → tuck end inside → wrap body around → drape pallu over shoulder</text>
</svg>
