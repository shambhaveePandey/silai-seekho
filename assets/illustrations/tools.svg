<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200" role="img" aria-label="Tailoring tools illustration">
  <style>
    @keyframes needleSew{0%{transform:translateY(0)}50%{transform:translateY(18px)}100%{transform:translateY(0)}}
    @keyframes threadPull{0%{stroke-dashoffset:200}100%{stroke-dashoffset:0}}
    @keyframes shimmer{0%{opacity:.35}50%{opacity:1}100%{opacity:.35}}
    .needle-group{animation:needleSew 1.2s ease-in-out infinite;transform-box:fill-box}
    .thread-line{stroke-dasharray:200;animation:threadPull 2s ease forwards}
    .shimmer-el{animation:shimmer 2s ease-in-out infinite}
    .lbl{font:600 10px 'Work Sans',sans-serif;fill:#7a5c3a}
    .lbl-en{font:400 8px 'Work Sans',sans-serif;fill:#c4a882}
    @media(prefers-reduced-motion:reduce){.needle-group,.thread-line,.shimmer-el{animation:none}}
  </style>
  <!-- Tape measure -->
  <rect x="20" y="80" width="80" height="14" rx="7" fill="#e8d5b0" stroke="#b35c00" stroke-width="1.5"/>
  <rect x="22" y="83" width="6" height="8" rx="1" fill="#b35c00"/>
  <text x="60" y="108" class="lbl" text-anchor="middle">इंच टेप</text>
  <text x="60" y="120" class="lbl-en" text-anchor="middle">Tape Measure</text>
  <!-- Scissors -->
  <g transform="translate(130,70)">
    <g class="shimmer-el">
      <ellipse cx="0" cy="20" rx="12" ry="4" fill="#c0c0c0" stroke="#888" stroke-width="1"/>
      <rect x="-3" y="-20" width="6" height="40" rx="3" fill="#d0d0d0" stroke="#999" stroke-width="1"/>
      <ellipse cx="0" cy="-20" rx="10" ry="6" fill="none" stroke="#888" stroke-width="2"/>
    </g>
    <text x="0" y="42" class="lbl" text-anchor="middle">कैंची</text>
    <text x="0" y="54" class="lbl-en" text-anchor="middle">Scissors</text>
  </g>
  <!-- Needle + thread -->
  <g transform="translate(230,30)">
    <g class="needle-group">
      <rect x="-2" y="0" width="4" height="60" rx="2" fill="#aaa" stroke="#888" stroke-width="1"/>
      <ellipse cx="0" cy="0" rx="4" ry="5" fill="#ccc" stroke="#888"/>
      <ellipse cx="0" cy="8" rx="2" ry="3" fill="none" stroke="#666" stroke-width="1.2"/>
    </g>
    <path d="M0,65 Q20,80 5,100" fill="none" stroke="#b35c00" stroke-width="1.5" class="thread-line"/>
    <text x="0" y="118" class="lbl" text-anchor="middle">सुई-धागा</text>
    <text x="0" y="130" class="lbl-en" text-anchor="middle">Needle &amp; Thread</text>
  </g>
  <!-- Chalk -->
  <rect x="310" y="80" width="60" height="12" rx="6" fill="#f0e8d0" stroke="#b35c00" stroke-width="1.5"/>
  <rect x="312" y="82" width="10" height="8" rx="1" fill="#b35c00"/>
  <text x="340" y="108" class="lbl" text-anchor="middle">चॉक</text>
  <text x="340" y="120" class="lbl-en" text-anchor="middle">Chalk / Marker</text>
  <!-- Pin -->
  <g transform="translate(430,60)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#888" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#e05050"/>
    <text x="0" y="80" class="lbl" text-anchor="middle">पिन</text>
    <text x="0" y="92" class="lbl-en" text-anchor="middle">Pin</text>
  </g>
</svg>
