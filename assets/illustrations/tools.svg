<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220" role="img" aria-label="सिलाई के औज़ार — Tailoring Tools">
  <style>
    @keyframes needleSew{0%{transform:translateY(0)}50%{transform:translateY(16px)}100%{transform:translateY(0)}}
    @keyframes threadPull{0%{stroke-dashoffset:180}100%{stroke-dashoffset:0}}
    @keyframes shimmer{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}
    @keyframes tapeUnroll{0%{stroke-dashoffset:80}100%{stroke-dashoffset:0}}
    @keyframes scissorSnip{0%,80%,100%{transform:rotate(0deg)}90%{transform:rotate(-12deg)}}
    .needle-group{animation:needleSew 1.3s ease-in-out infinite;transform-box:fill-box;transform-origin:center top}
    .thread-line{stroke-dasharray:180;stroke-dashoffset:180;animation:threadPull 2.2s ease forwards}
    .shimmer-el{animation:shimmer 2s ease-in-out infinite}
    .tape-marks{stroke-dasharray:80;stroke-dashoffset:80;animation:tapeUnroll 1.8s ease-out 0.3s forwards}
    .scissor-blade{animation:scissorSnip 2.5s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 60%}
    .lbl{font:700 10px 'Noto Sans Devanagari','Work Sans',sans-serif;fill:#2a1a0a;text-anchor:middle}
    .lbl-en{font:400 8.5px 'Work Sans',sans-serif;fill:#7a5c3a;text-anchor:middle}
    @media(prefers-reduced-motion:reduce){.needle-group,.thread-line,.shimmer-el,.tape-marks,.scissor-blade{animation:none;stroke-dashoffset:0}}
  </style>

  <rect width="560" height="220" fill="#fff9f3"/>

  <!-- ─── 1. MEASURING TAPE (इंच टेप) ─── -->
  <!-- Circular tape case -->
  <g transform="translate(50,60)">
    <!-- Case body (round, like a real tape measure) -->
    <circle cx="28" cy="28" r="26" fill="#e8d5b0" stroke="#b35c00" stroke-width="2"/>
    <circle cx="28" cy="28" r="20" fill="#d4c090" stroke="#b35c00" stroke-width="1"/>
    <!-- Center hub -->
    <circle cx="28" cy="28" r="7" fill="#b35c00"/>
    <circle cx="28" cy="28" r="3" fill="#fbe9c8"/>
    <!-- Lock button on top -->
    <rect x="24" y="0" width="8" height="6" rx="3" fill="#8b6914" stroke="#6a4d10" stroke-width="0.8"/>
    <!-- Tape being pulled out (goes right) -->
    <path d="M54,24 L120,18 L120,38 L54,32" fill="#fbe9c8" stroke="#b35c00" stroke-width="1.2"/>
    <!-- Measurement ticks on tape -->
    <g class="tape-marks" stroke="#b35c00" stroke-width="0.8" fill="none">
      <line x1="63" y1="18" x2="63" y2="38"/>
      <line x1="69" y1="20" x2="69" y2="36"/>
      <line x1="75" y1="20" x2="75" y2="36"/>
      <line x1="81" y1="20" x2="81" y2="36"/>
      <line x1="87" y1="19" x2="87" y2="37"/>
      <line x1="93" y1="20" x2="93" y2="36"/>
      <line x1="99" y1="20" x2="99" y2="36"/>
      <line x1="105" y1="20" x2="105" y2="36"/>
      <line x1="111" y1="19" x2="111" y2="37"/>
      <line x1="117" y1="19" x2="117" y2="37"/>
    </g>
    <!-- Tape numbers -->
    <text x="69" y="46" font-family="'Work Sans'" font-size="7" fill="#b35c00" text-anchor="middle">1"</text>
    <text x="87" y="46" font-family="'Work Sans'" font-size="7" fill="#b35c00" text-anchor="middle">2"</text>
    <text x="105" y="46" font-family="'Work Sans'" font-size="7" fill="#b35c00" text-anchor="middle">3"</text>
    <!-- cm side hint -->
    <text x="87" y="14" font-family="'Work Sans'" font-size="7" fill="#7a5c3a" text-anchor="middle" opacity="0.7">cm ↑</text>
    <text x="50" y="120" class="lbl">इंच टेप</text>
    <text x="50" y="132" class="lbl-en">Measuring Tape</text>
    <text x="50" y="142" class="lbl-en">60" / 150 cm</text>
  </g>

  <!-- ─── 2. SCISSORS (कैंची) ─── -->
  <g transform="translate(200,48)">
    <!-- Upper blade -->
    <g class="scissor-blade">
      <path d="M40,10 L5,80 Q0,90 8,95 Q16,100 22,90 L50,25 Z" fill="#c8c8c8" stroke="#888" stroke-width="1.2"/>
      <!-- Upper ring handle -->
      <ellipse cx="35" cy="12" rx="20" ry="13" fill="none" stroke="#888" stroke-width="2"/>
      <ellipse cx="35" cy="12" rx="13" ry="8" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
      <!-- Blade edge highlight -->
      <path d="M46,24 L10,85 Q7,90 10,93" fill="none" stroke="#a0a0a0" stroke-width="0.8"/>
    </g>
    <!-- Lower blade (static) -->
    <path d="M50,25 L82,88 Q88,98 80,103 Q72,108 66,98 L40,25 Z" fill="#d0d0d0" stroke="#888" stroke-width="1.2"/>
    <!-- Lower ring handle -->
    <ellipse cx="76" cy="88" rx="20" ry="14" fill="none" stroke="#888" stroke-width="2"/>
    <ellipse cx="76" cy="88" rx="13" ry="9" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
    <!-- Screw/pivot -->
    <circle cx="45" cy="26" r="4" fill="#888" stroke="#666" stroke-width="1"/>
    <circle cx="45" cy="26" r="1.5" fill="#555"/>
    <!-- Shimmer on blades -->
    <path d="M48,26 L55,45" stroke="white" stroke-width="1" opacity="0.5" class="shimmer-el"/>
    <text x="45" y="140" class="lbl">कैंची</text>
    <text x="45" y="152" class="lbl-en">Fabric Scissors</text>
    <text x="45" y="162" class="lbl-en">Never use on paper!</text>
  </g>

  <!-- ─── 3. NEEDLE + THREAD (सुई-धागा) ─── -->
  <g transform="translate(340,30)">
    <g class="needle-group">
      <!-- Needle body (slender, tapered) -->
      <path d="M-1.5,4 L1.5,4 L1,68 L0,75 L-1,68 Z" fill="#b0b8c0" stroke="#888" stroke-width="0.8"/>
      <!-- Eye of needle (oval hole) -->
      <ellipse cx="0" cy="9" rx="3" ry="4.5" fill="none" stroke="#666" stroke-width="1.4"/>
      <!-- Needle head (slightly wider) -->
      <ellipse cx="0" cy="4" rx="3" ry="4" fill="#c8d0d8" stroke="#888" stroke-width="1"/>
      <!-- Thread through eye -->
      <path d="M-3,9 Q-8,20 -5,35" fill="none" stroke="#b35c00" stroke-width="1.2"/>
    </g>
    <!-- Thread spool -->
    <ellipse cx="20" cy="100" rx="16" ry="8" fill="#d4c090" stroke="#b35c00" stroke-width="1.2"/>
    <rect x="4" y="88" width="32" height="14" fill="#e8d5b0" stroke="#b35c00" stroke-width="1"/>
    <ellipse cx="20" cy="88" rx="16" ry="8" fill="#c8a870" stroke="#b35c00" stroke-width="1.2"/>
    <!-- Thread on spool (wound) -->
    <ellipse cx="20" cy="92" rx="10" ry="4" fill="none" stroke="#b35c00" stroke-width="1" class="shimmer-el"/>
    <!-- Thread line from spool to needle -->
    <path d="M20,88 Q10,75 0,65" fill="none" stroke="#b35c00" stroke-width="1.2" class="thread-line"/>
    <text x="15" y="140" class="lbl">सुई-धागा</text>
    <text x="15" y="152" class="lbl-en">Needle &amp; Thread</text>
    <text x="15" y="162" class="lbl-en">Sizes 9–18</text>
  </g>

  <!-- ─── 4. TAILOR'S CHALK (चॉक) ─── -->
  <g transform="translate(430,55)">
    <!-- Tailor's chalk = flat diamond/wedge shape (NOT a cylinder!) -->
    <!-- Diamond/rhombus top view -->
    <g class="shimmer-el">
      <!-- Main chalk body (wedge shape, triangular cross-section) -->
      <path d="M40,10 L75,30 L40,80 L5,30 Z" fill="#f8f4ea" stroke="#b35c00" stroke-width="1.5"/>
      <!-- Side face of wedge (3D effect) -->
      <path d="M75,30 L78,50 L43,100 L40,80 Z" fill="#e8e0d0" stroke="#b35c00" stroke-width="1"/>
      <!-- Top edge (thin sharp edge for marking) -->
      <path d="M5,30 L40,10 L75,30" fill="none" stroke="#c4a882" stroke-width="0.8"/>
      <!-- Chalk line it makes -->
      <path d="M40,80 L43,100 L30,108 L27,88" fill="#f0e8d0" stroke="#b35c00" stroke-width="0.8"/>
      <!-- Chalk dust effect -->
      <circle cx="30" cy="108" r="1.5" fill="#c4a882" opacity="0.5"/>
      <circle cx="35" cy="110" r="1" fill="#c4a882" opacity="0.4"/>
      <circle cx="25" cy="106" r="1" fill="#c4a882" opacity="0.3"/>
      <!-- Brand marking on chalk -->
      <text x="40" y="55" text-anchor="middle" font-family="'Work Sans'" font-size="7" fill="#7a5c3a" transform="rotate(-25 40 55)">CHALK</text>
      <!-- Markings line (fabric marking) -->
      <line x1="5" y1="120" x2="78" y2="120" stroke="#b35c00" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.5"/>
      <text x="42" y="116" text-anchor="middle" font-family="'Work Sans'" font-size="6.5" fill="#b35c00">— marks on fabric —</text>
    </g>
    <text x="42" y="148" class="lbl">चॉक / मार्कर</text>
    <text x="42" y="160" class="lbl-en">Tailor's Chalk</text>
    <text x="42" y="170" class="lbl-en">Marks cutting lines</text>
  </g>

  <!-- ─── 5. PIN (पिन) ─── -->
  <!-- Hidden: Pin is shown as part of needle group context. Give it a proper spot. -->
  <!-- Actually let me add a separate pin at far right... wait, let me check the viewBox.
       560px wide, and we have tools at 50, 200, 340, 430. Let me squeeze pin in. -->
  <!-- Pins are typically in pinhole at around x=520 -->
  <!-- Actually there's not enough space. Let me add a pin cushion with pins. -->

  <!-- Pin cushion with pins -->
  <g transform="translate(155,65)">
    <!-- Pin cushion (tomato shape) -->
    <ellipse cx="22" cy="38" rx="20" ry="16" fill="#e05050" stroke="#c03030" stroke-width="1.2"/>
    <ellipse cx="22" cy="35" rx="18" ry="13" fill="#e85555"/>
    <!-- Cushion ridges -->
    <path d="M5,35 Q22,28 39,35" fill="none" stroke="#c03030" stroke-width="0.8" opacity="0.5"/>
    <path d="M8,40 Q22,32 36,40" fill="none" stroke="#c03030" stroke-width="0.8" opacity="0.5"/>
    <!-- Pin stems sticking up -->
    <line x1="12" y1="38" x2="8" y2="8" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="#016b6f"/>
    <line x1="22" y1="35" x2="20" y2="5" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="20" cy="5" r="3" fill="#e05050"/>
    <line x1="32" y1="37" x2="36" y2="7" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="36" cy="7" r="3" fill="#c89000"/>
    <!-- Pin sharp tip (triangle) -->
    <line x1="8" y1="38" x2="7" y2="44" stroke="#888" stroke-width="1"/>
    <line x1="20" y1="38" x2="19" y2="44" stroke="#888" stroke-width="1"/>
    <line x1="36" y1="38" x2="37" y2="44" stroke="#888" stroke-width="1"/>
    <!-- Tail (emery strawberry) -->
    <path d="M14,52 Q22,56 30,52 L28,48 Q22,52 16,48 Z" fill="#228B22"/>
    <text x="22" y="100" class="lbl">पिन</text>
    <text x="22" y="112" class="lbl-en">Dressmaker Pins</text>
    <text x="22" y="122" class="lbl-en">Holds fabric layers</text>
  </g>

  <!-- Bottom title bar -->
  <rect x="0" y="192" width="560" height="28" fill="rgba(179,92,0,0.06)" stroke="none"/>
  <text x="280" y="207" text-anchor="middle" font-family="'Noto Sans Devanagari','Work Sans'" font-size="10" font-weight="700" fill="#b35c00">सिलाई के 5 बुनियादी औज़ार · 5 Essential Tailoring Tools</text>
  <text x="280" y="217" text-anchor="middle" font-family="'Work Sans'" font-size="8" fill="#7a5c3a">Measuring Tape · Scissors · Needle &amp; Thread · Tailor's Chalk · Pins</text>
</svg>
